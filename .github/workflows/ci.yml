name: AI Multi-Agent CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .:src:tests
      # tránh matplotlib lỗi display
      MPLBACKEND: Agg
      GOOGLE_API_KEY: "dummy_google_key"
      TAVILY_API_KEY: "dummy_tavily_key"
      LANGSMITH_API_KEY: "dummy_langsmith_key"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # 👉 đảm bảo import src/ hoạt động
      - name: Verify import path
        run: |
          python -c "import sys; print(sys.path)"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --maxfail=1
